name: calendar.gym.sync

on:
  schedule:
    - cron: "*/30 7-23 * * *"   # every 30 min, 7am–midnight UTC
    - cron: "*/30 0-1 * * *"   # every 30 min, midnight–2am UTC
  workflow_dispatch: {}

jobs:
  create:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ hashFiles('yarn.lock') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: yarn playwright install chromium --with-deps

      - name: Install Playwright system dependencies
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: yarn playwright install-deps chromium

      - name: Write Google credentials
        env:
          CALENDAR_CREDENTIALS_JSON: ${{ secrets.CALENDAR_CREDENTIALS_JSON }}
          CALENDAR_TOKEN_JSON: ${{ secrets.CALENDAR_TOKEN_KINGOFKERNING_JSON }}
          CALENDAR_TOKEN_JOHN_JSON: ${{ secrets.CALENDAR_TOKEN_JOHN_JSON }}
        run: |
          echo "$CALENDAR_CREDENTIALS_JSON" > credentials.json
          echo "$CALENDAR_TOKEN_JSON" > "token-kingofkerning@gmail.com.json"
          [ -n "$CALENDAR_TOKEN_JOHN_JSON" ] && echo "$CALENDAR_TOKEN_JOHN_JSON" > "token-john@synapticmishap.co.uk.json" || true

      - name: Create TeamUp gym appointments
        env:
          TEAMUP_EMAIL: ${{ secrets.TEAMUP_EMAIL }}
          TEAMUP_PASSWORD: ${{ secrets.TEAMUP_PASSWORD }}
          TEAMUP_DEBUG: ${{ github.event_name == 'workflow_dispatch' && 'true' || '' }}
        run: yarn teamup

      - name: Upload debug screenshots
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: teamup-debug-screenshots
          path: |
            teamup-debug-*.png
            teamup-debug-*.html
          if-no-files-found: ignore

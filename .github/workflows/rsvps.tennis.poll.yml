name: rsvps.tennis.poll

on:
  workflow_dispatch: {}

permissions:
  actions: write

jobs:
  poll:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install

      - name: Write Google credentials
        env:
          CALENDAR_CREDENTIALS_JSON: ${{ secrets.CALENDAR_CREDENTIALS_JSON }}
          CALENDAR_TOKEN_JSON: ${{ secrets.CALENDAR_TOKEN_KINGOFKERNING_JSON }}
        run: |
          echo "$CALENDAR_CREDENTIALS_JSON" > credentials.json
          echo "$CALENDAR_TOKEN_JSON" > "token-kingofkerning@gmail.com.json"

      - name: Poll for accepted invitations
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}
        run: yarn tsx src/poll-rsvp.ts

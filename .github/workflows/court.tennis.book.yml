name: court.tennis.book

on:
  workflow_dispatch:
    inputs:
      booking_url:
        description: "The better.org.uk booking URL to complete"
        required: true
        type: string
      dry_run:
        description: "Navigate to payment screen but do not submit"
        type: boolean
        default: false

jobs:
  book:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ hashFiles('yarn.lock') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: yarn playwright install chromium --with-deps

      - name: Install Playwright system dependencies
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: yarn playwright install-deps chromium

      - name: Book the court
        env:
          BOOKING_URL: ${{ inputs.booking_url }}
          BETTER_EMAIL: ${{ secrets.BETTER_EMAIL }}
          BETTER_PASSWORD: ${{ secrets.BETTER_PASSWORD }}
          CARD_CVC: ${{ secrets.CARD_CVC }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: yarn tsx src/book-court.ts

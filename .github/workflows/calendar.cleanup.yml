name: calendar.cleanup

on:
  workflow_dispatch: {}

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install

      - name: Write Google credentials
        env:
          CALENDAR_SERVICE_ACCOUNT_JSON: ${{ secrets.CALENDAR_SERVICE_ACCOUNT_JSON }}
        run: echo "$CALENDAR_SERVICE_ACCOUNT_JSON" > service-account.json

      - name: Delete bot-created events without invites
        run: yarn cleanup
